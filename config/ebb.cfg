###################################
# EBB
###################################

[mcu EBBCan]
canbus_uuid: 7923f36815fd
canbus_interface: can0


[adxl345]
cs_pin: EBBCan: PB12
spi_software_sclk_pin: EBBCan: PB10
spi_software_mosi_pin: EBBCan: PB11
spi_software_miso_pin: EBBCan: PB2
axes_map: x,y,z

[resonance_tester] 
accel_chip: adxl345
probe_points:
    90,90,20  # an example

[extruder]
step_pin: EBBCan: PD0
dir_pin: !EBBCan: PD1
enable_pin: !EBBCan: PD2
microsteps: 16
full_steps_per_rotation: 200
rotation_distance: 22 
Gear_ratio: 50:10
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: EBBCan: PB13
control: pid
pid_Kp: 23.216 
pid_Ki: 1.629 
pid_Kd: 82.712
min_temp: 0
max_temp: 450

sensor_type:MAX31865
sensor_pin: EBBCan: PA4
spi_bus: spi1
rtd_nominal_r: 1000
rtd_reference_r: 4300
rtd_num_of_wires: 2

max_extrude_only_distance: 250.0
max_extrude_cross_section: 250
#pressure_advance: 0.02
#pressure_advance_smooth_time: 0.03

[tmc2209 extruder]
uart_pin: EBBCan: PA15
run_current: 0.76
stealthchop_threshold: 0

#[firmware_retraction]
#retract_length: 0.6
#retract_speed: 30
#unretract_extra_length: 0.00
#unretract_speed: 80


[probe]
speed: 150
x_offset: 25
y_offset: 40
#z_offset: 1.537 # Adjust this to fit your setup
pin: EBBCan: PB8 # For NPN NC probes such as the Super Pinda / Vinda / SupCR / Decoprobe probes.
samples: 2
samples_result: median
sample_retract_dist: 3.0
samples_tolerance: 0.006
samples_tolerance_retries: 3
lift_speed: 30
speed: 30

