[fan] # CPAP
pin: PB6
max_power: 1
shutdown_speed: 0
off_below: 0.2
hardware_pwm: true
cycle_time: 0.00001
off_below: 0.2

[output_pin CPAPpowerfeed]
#in Heater1
pin: PA0
pwm: false
value: 1
shutdown_value: 0

