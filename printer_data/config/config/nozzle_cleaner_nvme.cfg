[manual_stepper cleaner_stepper]
enable_pin: !PD4
step_pin: PD3
dir_pin: !PD2

microsteps: 16
rotation_distance: 1150
velocity: 400
accel: 8500
endstop_pin: PF4 # x_MAX

[tmc2209 manual_stepper cleaner_stepper]
interpolate: false
uart_pin: PD7
run_current: 0.8
hold_current: 0.4
stealthchop_threshold: 0


[gcode_macro _SET_NOZZLE_CLEANER_ENABLED]
variable_enabled: 0
gcode:
    {% set enabled=params.ENABLED|int %}
	{% set nozzle_cleaner_enabled=printer["gcode_macro _SET_NOZZLE_CLEANER_ENABLED"].enabled|int %}
	{% if enabled!=nozzle_cleaner_enabled %}
		SET_GCODE_VARIABLE MACRO=_SET_NOZZLE_CLEANER_ENABLED VARIABLE=enabled VALUE={enabled}
		{% if enabled==1 %}
  			MANUAL_STEPPER STEPPER=cleaner_stepper ENABLE=true           
			MANUAL_STEPPER STEPPER=cleaner_stepper MOVE=-2000 STOP_ON_ENDSTOP=1 SPEED=60
			MANUAL_STEPPER STEPPER=cleaner_stepper SET_POSITION=0
		{% else %}
			MANUAL_STEPPER STEPPER=cleaner_stepper MOVE=0
			MANUAL_STEPPER STEPPER=cleaner_stepper ENABLE=0
		{% endif %}
	{% endif %}

[gcode_macro CLEAN_NOZZLE]
variable_start_x: 115          # X center of brush
variable_start_y: 221         # Y center of brush
variable_start_z: 15            # Z height of brush
variable_wipe_dist_y: 0         # Y wipe on brush + and minus
variable_wipe_dist_x: 14.5      # X wipe on brush
variable_wipe_qty: 3            # Number of Wipes
variable_wipe_spd: 60           # Wipe speed

gcode:
 SAVE_GCODE_STATE NAME=clean_nozzle_state
 
 {% set travel_speed = (printer.toolhead.max_velocity) * 60 | float %} 
 {% if "xyz" not in printer.toolhead.homed_axes %} 
  G28
 {% endif %}
  _SET_NOZZLE_CLEANER_ENABLED ENABLED=1

  G90                                                       
  G1 X{start_x + 100} Y{start_y} F6000
  G1 Z{start_z } F1500
  MANUAL_STEPPER STEPPER=cleaner_stepper MOVE=390 SYNC=0
  G4 P1000
  G1 X{start_x} Y{start_y} F6000
 {% for wipes in range(1, (wipe_qty + 1)) %}

   G1 Z{start_z} F1500
   G1 X{start_x + wipe_dist_x} Y{start_y - wipe_dist_y} F{wipe_spd * 300}
   G1 X{start_x - wipe_dist_x} Y{start_y + wipe_dist_y} F{wipe_spd * 300}
   G1 X{start_x + wipe_dist_x} Y{start_y - wipe_dist_y} F{wipe_spd * 300}
   G1 X{start_x - wipe_dist_x} Y{start_y + wipe_dist_y} F{wipe_spd * 300}
   G1 X{start_x + wipe_dist_x} Y{start_y - wipe_dist_y} F{wipe_spd * 300}
   
   # G1 X{start_x - wipe_dist_x} Y{start_y + wipe_dist_y} F{wipe_spd * 300}
   # G1 X{start_x - wipe_dist_x} Y{start_y - wipe_dist_y} F{wipe_spd * 300}
   # G1 X{start_x - wipe_dist_x} Y{start_y + wipe_dist_y} F{wipe_spd * 300}
   # G1 X{start_x - wipe_dist_x} Y{start_y - wipe_dist_y} F{wipe_spd * 300}
   # G1 X{start_x - wipe_dist_x} Y{start_y + wipe_dist_y} F{wipe_spd * 300}
   
 {% endfor %} 
   G90
   G1 X{start_x + 100 } Y{start_y} F6000
   MANUAL_STEPPER STEPPER=cleaner_stepper MOVE=0 SYNC=0
   RESTORE_GCODE_STATE NAME=clean_nozzle_state