### Printer
########################

[printer]
kinematics: corexy
max_velocity: 1000
max_accel: 60000
minimum_cruise_ratio: 0.7
max_z_velocity: 40
max_z_accel: 2000
square_corner_velocity: 20

#[input_shaper]
