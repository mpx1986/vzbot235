#Macro inspired by klipper-github issue https://github.com/Klipper3d/klipper/issues/2174
[gcode_macro M106]
rename_existing: G106
gcode:
    {% set P = params.P | default(0) | int %}
    {% set S = params.S | default(255) | int %}
    {% if P == 0 %}
        G106 S{S}
    {% else %}
        {% set fan = "RSCS" if P == 2 else "Exhaust_fan" %}
        SET_FAN_SPEED FAN={fan} SPEED={S / 255}
    {% endif %}

[gcode_macro M107]
rename_existing: G107
gcode:
    {% set fan = params.P|default(1)|int %}
	{% if fan == 2 %}
		SET_FAN_SPEED FAN=RSCS SPEED=0 
	{% else %}
	  SET_FAN_SPEED FAN=RSCS SPEED=0  
	  G107
	{% endif %}


########################
# Watercooling
########################

[heater_fan pump]
pin: PF8      #FAN5
tachometer_pin: PC1
shutdown_speed: 1.0    # Pump runs at 100% if Klipper crashes (Safety!)
fan_speed: 1.0
cycle_time: 0.01
heater: extruder
heater_temp: 35

[heater_fan hotend_fan]
pin: PA2   #FAN6
tachometer_pin: PC2
fan_speed: 1.0
cycle_time: 0.01
heater: extruder
heater_temp: 35
shutdown_speed: 1.0  


