pin: PF8      #FAN5
tachometer_pin: PC1
shutdown_speed: 1.0    # Pump runs at 100% if Klipper crashes (Safety!)
fan_speed: 1.0
cycle_time: 0.01
heater: extruder
heater_temp: 10

[heater_fan hotend_fan]
pin: PA2   #FAN6
tachometer_pin: PC2
fan_speed: 1.0
cycle_time: 0.01
heater: extruder
heater_temp: 10
shutdown_speed: 1.0  

